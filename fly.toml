app = "sparamer-landing"
primary_region = "gru"

[build]

[env]
  HOSTNAME = "0.0.0.0"
  PORT = "3000"
  SITE_URL = "https://sparamer.com"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1